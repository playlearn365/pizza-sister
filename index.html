<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIZZA姊姊說故事 🍕</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pizza-red: #FF4D4D;
    --pizza-orange: #FF8C42;
    --pizza-yellow: #FFD166;
    --pizza-green: #06D6A0;
    --pizza-blue: #118AB2;
    --pizza-purple: #9B5DE5;
    --pizza-pink: #F72585;
    --bg: #FFF9F0;
    --bubble-bg: #ffffff;
    --text: #2D2D2D;
    --shadow: 0 8px 32px rgba(255,77,77,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Floating pizza decorations */
  .pizza-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .pizza-bg span {
    position: absolute; font-size: 2rem; opacity: 0.08;
    animation: floatPizza 12s infinite ease-in-out;
  }
  .pizza-bg span:nth-child(1) { top: 5%; left: 8%; animation-delay: 0s; }
  .pizza-bg span:nth-child(2) { top: 20%; left: 85%; animation-delay: 2s; }
  .pizza-bg span:nth-child(3) { top: 50%; left: 5%; animation-delay: 4s; }
  .pizza-bg span:nth-child(4) { top: 70%; left: 80%; animation-delay: 6s; }
  .pizza-bg span:nth-child(5) { top: 85%; left: 45%; animation-delay: 8s; }
  .pizza-bg span:nth-child(6) { top: 35%; left: 50%; animation-delay: 3s; font-size: 3rem; }
  @keyframes floatPizza {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }

  /* API Key Screen */
  #apiScreen {
    position: fixed; inset: 0; background: linear-gradient(135deg, #FF4D4D 0%, #FF8C42 50%, #FFD166 100%);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .api-card {
    background: white; border-radius: 32px; padding: 48px 40px;
    max-width: 480px; width: 100%; text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .api-pizza { font-size: 80px; margin-bottom: 16px; display: block;
    animation: bounce 2s infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .api-card h1 { font-family: 'Baloo 2', cursive; font-size: 2rem; color: var(--pizza-red);
    font-weight: 800; margin-bottom: 8px; }
  .api-card p { color: #666; font-size: 1rem; margin-bottom: 28px; line-height: 1.5; }
  .api-input-group { margin-bottom: 12px; }
  .api-input-group label { display: block; font-weight: 700; color: #444;
    margin-bottom: 6px; text-align: left; font-size: 0.9rem; }
  .api-input-group input {
    width: 100%; padding: 14px 18px; border: 3px solid #eee; border-radius: 16px;
    font-size: 1rem; font-family: 'Nunito', sans-serif; outline: none;
    transition: border-color 0.2s;
  }
  .api-input-group input:focus { border-color: var(--pizza-red); }
  .api-hint { font-size: 0.78rem; color: #999; margin-bottom: 24px; text-align: left; }
  .btn-start {
    width: 100%; padding: 16px; background: linear-gradient(135deg, #FF4D4D, #FF8C42);
    border: none; border-radius: 16px; color: white; font-size: 1.2rem;
    font-family: 'Baloo 2', cursive; font-weight: 700; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 6px 20px rgba(255,77,77,0.4);
  }
  .btn-start:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(255,77,77,0.5); }
  .btn-start:active { transform: translateY(0); }

  /* Main App */
  #app { display: none; flex-direction: column; width: 100%; max-width: 720px;
    min-height: 100vh; position: relative; z-index: 1; }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 14px; padding: 20px 24px 12px;
    background: white; box-shadow: 0 4px 20px rgba(255,77,77,0.1);
    position: sticky; top: 0; z-index: 10;
  }
  .header-avatar {
    width: 56px; height: 56px; background: linear-gradient(135deg, #FF4D4D, #FF8C42);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0; box-shadow: 0 4px 12px rgba(255,77,77,0.35);
    animation: headerBounce 3s ease-in-out infinite;
  }
  @keyframes headerBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .header-info h2 { font-family: 'Baloo 2', cursive; font-size: 1.3rem;
    color: var(--pizza-red); font-weight: 800; }
  .header-info p { font-size: 0.82rem; color: #999; }
  .header-tts { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .tts-toggle {
    background: none; border: 2.5px solid #eee; border-radius: 20px;
    padding: 6px 14px; font-family: 'Nunito', sans-serif; font-size: 0.85rem;
    cursor: pointer; color: #888; font-weight: 700; transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .tts-toggle.active { border-color: var(--pizza-green); color: var(--pizza-green);
    background: rgba(6,214,160,0.08); }

  /* Chat Area */
  .chat-area {
    flex: 1; overflow-y: auto; padding: 20px 16px; display: flex;
    flex-direction: column; gap: 16px;
  }

  /* Messages */
  .msg { display: flex; gap: 10px; max-width: 88%; animation: msgIn 0.35s cubic-bezier(0.34,1.3,0.64,1); }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(16px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg.pizza { align-self: flex-start; flex-direction: row; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    background: linear-gradient(135deg, #FF4D4D, #FF8C42);
    box-shadow: 0 3px 10px rgba(255,77,77,0.3);
  }
  .msg.user .msg-avatar {
    background: linear-gradient(135deg, var(--pizza-blue), var(--pizza-purple));
    box-shadow: 0 3px 10px rgba(17,138,178,0.3);
  }

  .msg-bubble {
    padding: 14px 18px; border-radius: 22px; line-height: 1.65;
    font-size: 1.02rem; max-width: calc(100% - 52px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  }
  .msg.pizza .msg-bubble {
    background: white; color: var(--text);
    border-bottom-left-radius: 6px;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--pizza-blue), var(--pizza-purple));
    color: white; border-bottom-right-radius: 6px;
  }

  /* Typing indicator */
  .typing-indicator { display: flex; gap: 5px; padding: 14px 18px; }
  .typing-indicator span {
    width: 9px; height: 9px; background: var(--pizza-orange);
    border-radius: 50%; animation: typingDot 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
    40% { transform: scale(1.1); opacity: 1; }
  }

  /* Speaking indicator */
  .speaking-indicator {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(6,214,160,0.1); border-radius: 12px;
    padding: 4px 10px; margin-top: 8px; font-size: 0.78rem; color: var(--pizza-green);
    font-weight: 700;
  }
  .speaking-wave { display: flex; gap: 2px; align-items: center; }
  .speaking-wave span {
    width: 3px; background: var(--pizza-green); border-radius: 2px;
    animation: wave 0.8s infinite ease-in-out;
  }
  .speaking-wave span:nth-child(1) { height: 8px; }
  .speaking-wave span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
  .speaking-wave span:nth-child(3) { height: 10px; animation-delay: 0.2s; }
  .speaking-wave span:nth-child(4) { height: 16px; animation-delay: 0.3s; }
  .speaking-wave span:nth-child(5) { height: 8px; animation-delay: 0.4s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.6); }
    50% { transform: scaleY(1); }
  }

  /* Input Area */
  .input-area {
    padding: 14px 16px; background: white;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-wrap { flex: 1; position: relative; }
  textarea {
    width: 100%; padding: 14px 18px; border: 3px solid #eee; border-radius: 20px;
    font-size: 1rem; font-family: 'Nunito', sans-serif; outline: none; resize: none;
    max-height: 120px; line-height: 1.5; transition: border-color 0.2s;
    background: var(--bg);
  }
  textarea:focus { border-color: var(--pizza-red); background: white; }
  textarea::placeholder { color: #bbb; }
  textarea:disabled { opacity: 0.5; }

  .btn-send {
    width: 52px; height: 52px; background: linear-gradient(135deg, #FF4D4D, #FF8C42);
    border: none; border-radius: 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 22px;
    box-shadow: 0 4px 14px rgba(255,77,77,0.4); transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  .btn-send:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 8px 20px rgba(255,77,77,0.5); }
  .btn-send:active { transform: scale(0.95); }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Mic button */
  .btn-mic {
    width: 52px; height: 52px; background: linear-gradient(135deg, var(--pizza-blue), var(--pizza-purple));
    border: none; border-radius: 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 22px;
    box-shadow: 0 4px 14px rgba(17,138,178,0.4); transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0; position: relative;
  }
  .btn-mic:hover { transform: translateY(-2px) scale(1.05); }
  .btn-mic:active { transform: scale(0.95); }
  .btn-mic:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-mic.recording {
    background: linear-gradient(135deg, var(--pizza-pink), var(--pizza-red));
    box-shadow: 0 0 0 0 rgba(247,37,133,0.5);
    animation: micPulse 1.2s infinite;
  }
  @keyframes micPulse {
    0% { box-shadow: 0 0 0 0 rgba(247,37,133,0.5); }
    70% { box-shadow: 0 0 0 14px rgba(247,37,133,0); }
    100% { box-shadow: 0 0 0 0 rgba(247,37,133,0); }
  }

  /* Recording overlay in chat */
  .recording-msg {
    align-self: flex-end; display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--pizza-pink), var(--pizza-red));
    color: white; padding: 12px 20px; border-radius: 22px; border-bottom-right-radius: 6px;
    font-weight: 700; font-size: 0.95rem; max-width: 88%;
    box-shadow: 0 4px 16px rgba(247,37,133,0.35);
    animation: msgIn 0.35s cubic-bezier(0.34,1.3,0.64,1);
  }
  .rec-dot {
    width: 10px; height: 10px; background: white; border-radius: 50%;
    animation: recBlink 1s infinite;
  }
  @keyframes recBlink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Processing msg */
  .processing-msg {
    align-self: flex-end; background: rgba(155,93,229,0.12);
    color: var(--pizza-purple); padding: 10px 18px; border-radius: 22px;
    border-bottom-right-radius: 6px; font-weight: 700; font-size: 0.88rem;
    animation: msgIn 0.3s ease;
  }

  /* Stage badges */
  .stage-badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 800; margin-bottom: 8px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .stage-story { background: rgba(255,141,66,0.15); color: var(--pizza-orange); }
  .stage-q1 { background: rgba(6,214,160,0.15); color: var(--pizza-green); }
  .stage-q2 { background: rgba(155,93,229,0.15); color: var(--pizza-purple); }
  .stage-q3 { background: rgba(247,37,133,0.15); color: var(--pizza-pink); }
  .stage-q4 { background: rgba(17,138,178,0.15); color: var(--pizza-blue); }

  /* Error toast */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: #333; color: white; padding: 12px 24px; border-radius: 16px;
    font-size: 0.9rem; z-index: 50; animation: toastIn 0.3s ease;
    max-width: 90vw; text-align: center;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Scrollbar */
  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
</style>
</head>
<body>

<div class="pizza-bg">
  <span>🍕</span><span>⭐</span><span>🌟</span><span>🍕</span><span>✨</span><span>🍕</span>
</div>

<!-- API Key Screen -->
<div id="apiScreen">
  <div class="api-card">
    <span class="api-pizza">🍕</span>
    <h1>PIZZA姊姊說故事</h1>
    <p>老師您好！請輸入您的 Gemini API 金鑰，讓 PIZZA 姊姊開始跟小朋友一起創作故事吧！</p>
    <div class="api-input-group">
      <label>🔑 Google Gemini API Key</label>
      <input type="password" id="geminiKey" placeholder="AIza..." autocomplete="off">
    </div>
    <p class="api-hint">* 金鑰僅儲存於您的瀏覽器中，不會上傳至任何伺服器。此金鑰同時用於 AI 對話與語音朗讀功能。</p>
    <button class="btn-start" onclick="startApp()">🎉 開始說故事！</button>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div class="header">
    <div class="header-avatar">🍕</div>
    <div class="header-info">
      <h2>PIZZA 姊姊</h2>
      <p>一起來創作故事吧！</p>
    </div>
    <div class="header-tts">
      <button class="tts-toggle active" id="ttsBtn" onclick="toggleTTS()">🔊 語音開啟</button>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="小朋友說話，或按麥克風錄音 🎤" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="btn-mic" id="micBtn" onclick="toggleRecording()" title="按住說話">🎤</button>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let geminiKey = '';
let ttsEnabled = true;
let isSpeaking = false;
let conversationHistory = [];
let isLoading = false;
let currentAudio = null;

// Recording state
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let recordingMsgEl = null;

const SYSTEM_PROMPT = `你是PIZZA姊姊，一個專門為4到6歲幼兒說故事的溫暖、活潑、充滿愛心的說故事姊姊。

你的個性：
- 說話用簡單、可愛、溫暖的中文，符合4-6歲小朋友能理解的詞彙
- 非常有耐心、充滿熱情，常用「哇！」「好棒喔！」「你真的很厲害！」等鼓勵語句
- 說話有節奏感，像在說故事一樣生動有趣
- 用😊🌟⭐🍕🎉等表情符號讓對話更生動（但不要太多）

故事流程（請嚴格按照這個順序，每次只做當前步驟，絕對不可以跳步驟）：

步驟1【打招呼】：
- 用可愛的方式打招呼，自我介紹是PIZZA姊姊
- 問小朋友今天想聽什麼樣的故事
- 說完就停，等待小朋友回答。不做其他事。

步驟2【說故事開頭＋等選擇】：
- 當小朋友說出故事主題後，說約80-100字的故事開頭場景（不要有主角名字）
- 故事開頭說完後，立刻給3個主角選項讓小朋友選，格式如下：
  「故事裡的主角可以是...
  1️⃣ [選項A] 
  2️⃣ [選項B] 
  3️⃣ [選項C] 
  你想選哪一個呢？」
- ⚠️ 說完選項後立刻停止！絕對不可以繼續說故事！等小朋友選擇！

步驟3【繼續並完成故事】：
- 只有在小朋友明確說出選哪個主角之後，才進入這步驟
- 用小朋友選的主角，繼續把故事說完（約150-200字），要有起承轉合，結局溫馨有趣
- 故事說完後立刻停止，不做其他事

步驟4【讚美＋過渡問題】：
- 故事結束後，熱情讚美小朋友一起創作了這個故事（1-2句就好）
- 然後問：「你喜歡這個故事嗎？」
- 說完就停，等小朋友回答

步驟5【四層次提問】：
- 當小朋友說喜歡（或任何正面回應）後，才開始提問
- 依序一次只問一個問題，等小朋友回答後才問下一個：
  - 第一層（記憶）：問故事情節，例如「故事主角叫什麼？」「他遇到了誰？」
  - 第二層（推理）：「你覺得他為什麼要這樣做呢？」
  - 第三層（換位）：「如果你是[角色]，你會怎麼做？」
  - 第四層（生活）：「你有沒有像[角色]一樣的經驗？」

重要規則：
- 每次回應只做當前步驟該做的事，絕對不跳步驟
- 步驟2說完選項後必須停下來，不能自己繼續說故事
- 故事要乾淨、正向、適合幼兒
- 如果小朋友的回答很短或跑題，溫柔地引導回來
- 使用繁體中文`;

function startApp() {
  geminiKey = document.getElementById('geminiKey').value.trim();

  if (!geminiKey) {
    showToast('請輸入 Gemini API Key！');
    return;
  }

  document.getElementById('apiScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  unlockAudio();

  ttsEnabled = true;
  updateTTSBtn();

  // Start conversation
  sendToAPI('你好！', true);
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  if (!ttsEnabled && currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  updateTTSBtn();
}

function updateTTSBtn() {
  const btn = document.getElementById('ttsBtn');
  if (ttsEnabled) {
    btn.textContent = '🔊 語音開啟';
    btn.classList.add('active');
  } else {
    btn.textContent = '🔇 語音關閉';
    btn.classList.remove('active');
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  unlockAudio();
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  sendToAPI(text, false);
}

function addMessage(role, text, isTyping = false) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role === 'assistant' ? 'pizza' : 'user'}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'assistant' ? '🍕' : '🧒';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (isTyping) {
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    div.id = 'typingMsg';
  } else {
    bubble.innerHTML = formatText(text);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;

  return { div, bubble };
}

function formatText(text) {
  return text
    .replace(/\n/g, '<br>')
    .replace(/【(.+?)】/g, '<div class="stage-badge stage-story">$1</div>');
}

async function sendToAPI(userText, isInit) {
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('micBtn').disabled = true;

  if (!isInit) {
    conversationHistory.push({ role: 'user', parts: [{ text: userText }] });
  }

  // Show typing indicator
  addMessage('assistant', '', true);

  try {
    const contents = isInit
      ? [{ role: 'user', parts: [{ text: '開始！請用PIZZA姊姊的方式跟我打招呼並問我想聽什麼故事。' }] }]
      : conversationHistory;

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: contents,
          generationConfig: { maxOutputTokens: 600 }
        })
      }
    );

    const data = await response.json();

    // Remove typing indicator
    const typingMsg = document.getElementById('typingMsg');
    if (typingMsg) typingMsg.remove();

    if (data.error) {
      showToast('API 錯誤：' + data.error.message);
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('micBtn').disabled = false;
      return;
    }

    const reply = data.candidates[0].content.parts[0].text;
    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });

    // ① 立即顯示文字，不等 TTS
    const { bubble } = addMessage('assistant', reply);

    // ② 解鎖輸入，讓使用者可以繼續互動
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('micBtn').disabled = false;
    document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;

    // ③ TTS 在背景執行，不阻擋
    if (ttsEnabled) {
      const speakEl = document.createElement('div');
      speakEl.className = 'speaking-indicator';
      speakEl.innerHTML = '<div class="speaking-wave"><span></span><span></span><span></span><span></span><span></span></div> 正在說話中...';
      bubble.appendChild(speakEl);
      speakTextByChunks(reply, speakEl); // 不 await，背景執行
    }

  } catch (err) {
    const typingMsg = document.getElementById('typingMsg');
    if (typingMsg) typingMsg.remove();
    showToast('連線錯誤，請確認 API Key 是否正確。');
    console.error(err);
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('micBtn').disabled = false;
  }
}

// ── AudioContext（需使用者互動後解鎖）──────────────
let audioCtx = null;
function unlockAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// ── PCM → WAV 轉換（Gemini TTS 回傳 PCM，需手動加 header）──
function pcmToWav(pcmData, sampleRate) {
  const numChannels = 1, bitsPerSample = 16, dataSize = pcmData.length * 2;
  const buffer = new ArrayBuffer(44 + dataSize), view = new DataView(buffer);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
  ws(0, 'RIFF'); view.setUint32(4, 36 + dataSize, true); ws(8, 'WAVE'); ws(12, 'fmt ');
  view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true); view.setUint16(34, bitsPerSample, true);
  ws(36, 'data'); view.setUint32(40, dataSize, true);
  for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
  return new Blob([view], { type: 'audio/wav' });
}

// 清理 TTS 文字
function cleanForTTS(text) {
  return text
    .replace(/<[^>]+>/g, '')
    .replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27FF}]/gu, '')
    .replace(/[【】\[\]#*_`~]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

// 整段一起送 TTS（聲音統一、不跳句）
async function speakTextByChunks(text, indicator) {
  if (!ttsEnabled) { if (indicator) indicator.remove(); return; }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  try {
    const wavBlob = await fetchTTSAudio(cleanForTTS(text));
    if (wavBlob && ttsEnabled) await playWavBlob(wavBlob);
  } catch (e) {
    console.error('TTS error', e);
  } finally {
    if (indicator) indicator.remove();
  }
}

// 取得 TTS，回傳 WAV Blob
async function fetchTTSAudio(text) {
  if (!text || text.length < 1) return null;
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${geminiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text }] }],
          generationConfig: {
            responseModalities: ['AUDIO'],
            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: 'Aoede' } } }
          }
        })
      }
    );
    if (!res.ok) { console.error('TTS API error:', res.status); return null; }
    const data = await res.json();
    const inlineData = data?.candidates?.[0]?.content?.parts?.[0]?.inlineData;
    if (!inlineData?.data) { console.warn('TTS: no audio data'); return null; }
    const sampleRate = parseInt(inlineData.mimeType?.match(/rate=(\d+)/)?.[1] || '24000', 10);
    const binary = atob(inlineData.data);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const pcm16 = new Int16Array(bytes.buffer);
    return pcmToWav(pcm16, sampleRate);
  } catch (e) {
    console.error('TTS fetch error:', e);
    return null;
  }
}

// 用 AudioContext 播放 WAV Blob
async function playWavBlob(wavBlob) {
  return new Promise(async (resolve) => {
    try {
      if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
      if (audioCtx) {
        const arrayBuf = await wavBlob.arrayBuffer();
        const decoded = await audioCtx.decodeAudioData(arrayBuf);
        const src = audioCtx.createBufferSource();
        src.buffer = decoded;
        src.connect(audioCtx.destination);
        src.onended = resolve;
        src.start(0);
      } else {
        // Fallback
        const url = URL.createObjectURL(wavBlob);
        currentAudio = new Audio(url);
        currentAudio.onended = () => { URL.revokeObjectURL(url); resolve(); };
        currentAudio.onerror = () => { URL.revokeObjectURL(url); resolve(); };
        await currentAudio.play().catch(resolve);
      }
    } catch (e) {
      console.error('playWavBlob error:', e);
      resolve();
    }
  });
}

async function speakText(text, indicator) {
  await speakTextByChunks(text, indicator);
}

function base64ToBlob(base64, mimeType) {
  const bytes = atob(base64);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mimeType });
}

// ── Voice Recording ──────────────────────────────────────────
async function toggleRecording() {
  if (isLoading) return;
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    // 安卓 Chrome 相容：依序找支援的格式
    let mimeType = '';
    const candidates = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/ogg;codecs=opus',
      'audio/ogg',
      'audio/mp4',
      ''
    ];
    for (const type of candidates) {
      if (type === '' || MediaRecorder.isTypeSupported(type)) {
        mimeType = type;
        break;
      }
    }

    mediaRecorder = mimeType
      ? new MediaRecorder(stream, { mimeType })
      : new MediaRecorder(stream); // 讓瀏覽器自己選

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); processAudio(); };
    mediaRecorder.start();

    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('userInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;

    // Show recording indicator in chat
    const chatArea = document.getElementById('chatArea');
    recordingMsgEl = document.createElement('div');
    recordingMsgEl.className = 'recording-msg';
    recordingMsgEl.innerHTML = '<div class="rec-dot"></div> 錄音中... 按停止鍵結束';
    chatArea.appendChild(recordingMsgEl);
    chatArea.scrollTop = chatArea.scrollHeight;

  } catch (err) {
    showToast('無法開啟麥克風，請確認瀏覽器權限！');
    console.error(err);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micBtn').textContent = '🎤';
  document.getElementById('userInput').disabled = false;
}

async function processAudio() {
  // Remove recording indicator, show processing
  if (recordingMsgEl) { recordingMsgEl.remove(); recordingMsgEl = null; }

  const chatArea = document.getElementById('chatArea');
  const procEl = document.createElement('div');
  procEl.className = 'processing-msg';
  procEl.textContent = '🧠 正在聽小朋友說的話...';
  chatArea.appendChild(procEl);
  chatArea.scrollTop = chatArea.scrollHeight;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('micBtn').disabled = true;

  try {
    const recMime = mediaRecorder.mimeType || 'audio/webm';
    const audioBlob = new Blob(audioChunks, { type: recMime });
    const base64Audio = await blobToBase64(audioBlob);
    const audioMime = recMime.split(';')[0];

    // Send to Gemini for STT + context-aware reply in one shot
    const contents = [
      ...conversationHistory,
      {
        role: 'user',
        parts: [
          {
            inline_data: {
              mime_type: audioMime,
              data: base64Audio
            }
          },
          {
            text: '（這是小朋友說的話的錄音。請先在心裡理解小朋友說了什麼，然後以PIZZA姊姊的身份繼續故事流程回應。回應前請用一行「小朋友說：xxx」標示你聽到的內容，換行後再給出你的回應。）'
          }
        ]
      }
    ];

    procEl.remove();

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents,
          generationConfig: { maxOutputTokens: 1000 }
        })
      }
    );

    const data = await response.json();
    if (data.error) { showToast('語音辨識錯誤：' + data.error.message); return; }

    const fullReply = data.candidates[0].content.parts[0].text;

    // Parse out transcription line vs actual reply
    const lines = fullReply.split('\n');
    let transcription = '';
    let replyLines = [];
    let foundTrans = false;
    for (const line of lines) {
      if (!foundTrans && line.startsWith('小朋友說：')) {
        transcription = line.replace('小朋友說：', '').trim();
        foundTrans = true;
      } else if (foundTrans || !line.startsWith('小朋友說：')) {
        if (foundTrans) replyLines.push(line);
      }
    }
    // fallback: if no transcription line found, use full reply as reply
    const pizzaReply = replyLines.length ? replyLines.join('\n').trim() : fullReply;

    // Show transcription as user bubble
    if (transcription) {
      addMessage('user', '🎤 ' + transcription);
      conversationHistory.push({ role: 'user', parts: [{ text: transcription }] });
    }

    // Show PIZZA reply
    conversationHistory.push({ role: 'model', parts: [{ text: pizzaReply }] });
    const { bubble } = addMessage('assistant', pizzaReply);

    // TTS 背景執行，不阻擋
    if (ttsEnabled) {
      const speakEl = document.createElement('div');
      speakEl.className = 'speaking-indicator';
      speakEl.innerHTML = '<div class="speaking-wave"><span></span><span></span><span></span><span></span><span></span></div> 正在說話中...';
      bubble.appendChild(speakEl);
      speakTextByChunks(pizzaReply, speakEl); // 不 await
    }

  } catch (err) {
    showToast('處理語音時發生錯誤，請再試一次。');
    console.error(err);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('micBtn').disabled = false;
    document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
  }
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
// ─────────────────────────────────────────────────────────────

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}
